<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">

<!-- ── Path definition (hidden) ── -->
<!-- M 30,80 → right to 870 → down to 160 → left to 30 → down to 240 → right to 870 -->
<!-- Total: 840+80+840+80+840 = 2680px | dur=8s | speed=335px/s -->
